<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f8d7da;
            color: #721c24;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px 20px;
        }
        
        h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin: 10px 0;
        }
        .error-code {
            font-size: 30px;
            font-weight: bold;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 18px;
            color: white;
            background-color: #721c24;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #a71d2a;
        }
        
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem 1rem;
            width: 100%;
        }
        
        footer p {
            margin: 0.25rem 0;
            color: white;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }
            p {
                font-size: 16px;
            }
            .error-code {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Something went wrong!</h1>
        <p class="error-code">Error Code: 500</p>
        <p>An unexpected error occurred. Please try again later.</p>
        <p>If the problem persists, <a href="/">click here to return to the homepage</a>.</p>
        <a href="javascript:history.back()" class="button">Go Back</a>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2025 Sitare University. All rights reserved.</p>
            <p>Temporary Campus: SRMCEM Lucknow, India</p>
        </div>
    </footer>
</body>
</html>
