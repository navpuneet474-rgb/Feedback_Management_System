<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Management System - Sitare University</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #2c3e50;
        --primary-light: #3d5166;
        --accent: #c0392b;
        --gray-light: #f2f2f2;
        --gray-mid: #cccccc;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f7f8fa;
        color: #2c3e50;
      }

      /* ─── HEADER ─────────────────────────────────────────────── */
      .header {
        background: linear-gradient(135deg, #f2f2f2 0%, #dde1e7 60%, #cccccc 100%);
        padding: 0 32px;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 16px rgba(44,62,80,0.13);
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 88px;
        border-bottom: 3px solid var(--primary);
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 14px;
        text-decoration: none;
      }

      .header-logo img {
        height: 62px;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.10));
        transition: transform 0.3s ease;
      }

      .header-logo:hover img {
        transform: scale(1.04);
      }

      .header-title {
        flex: 1;
        text-align: center;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .header-title h3 {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        color: var(--primary);
        font-weight: 700;
        letter-spacing: 0.3px;
        line-height: 1.2;
        margin: 0;
      }

      .header-title span {
        display: block;
        font-family: "Montserrat", sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: #7f8c8d;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 3px;
      }

      .header-nav {
        display: flex;
        align-items: center;
        gap: 4px;
        list-style: none;
      }

      .header-nav li a {
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        padding: 0.525em 2em;
        border-radius: 12px;
        text-decoration: none;
        letter-spacing: 0.4px;
        background: #000;
        border: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        display: inline-block;
      }

      .header-nav li a:hover {
        background: #333;
        color: #fff;
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        text-decoration: none;
      }

      /* ─── SLIDESHOW ───────────────────────────────────────────── */
      .slideshow-container {
        max-width: 1200px;
        margin: 2.2rem auto 0;
        position: relative;
        overflow: hidden;
        border-radius: 14px;
        box-shadow: 0 8px 40px rgba(44,62,80,0.15);
      }

      .mySlides { display: none; }

      .mySlides img {
        width: 100%;
        height: 500px;
        object-fit: cover;
        display: block;
      }

      .prev, .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        padding: 14px 18px;
        color: white;
        font-weight: bold;
        font-size: 18px;
        transition: background 0.3s ease, transform 0.2s;
        user-select: none;
        background: rgba(44,62,80,0.55);
        backdrop-filter: blur(4px);
        border-radius: 8px;
        z-index: 10;
        text-decoration: none;
      }

      a:not([href]):not([tabindex]) { color: white; text-decoration: none; }

      .next { right: 14px; }
      .prev { left: 14px; }

      .prev:hover, .next:hover {
        background: rgba(44,62,80,0.88);
        transform: translateY(-50%) scale(1.07);
      }

      .dots-wrapper {
        text-align: center;
        margin: 14px 0 0;
      }

      .dot {
        height: 10px;
        width: 10px;
        margin: 0 5px;
        background-color: #c0cad4;
        border-radius: 50%;
        display: inline-block;
        cursor: pointer;
        transition: background-color 0.4s, transform 0.3s;
      }

      .active, .dot:hover {
        background-color: var(--primary);
        transform: scale(1.3);
      }

      /* ─── CTA SECTION ─────────────────────────────────────────── */
      .cta-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.8rem 1.25rem 1.5rem;
        gap: 12px;
      }

      .cta-label {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: #8a9bb0;
        margin-bottom: 4px;
      }

      /* ─── BUTTON ──────────────────────────────────────────────── */
      .btn-login {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 0 36px;
        height: 58px;
        border-radius: 14px;
        background: var(--primary);
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.6px;
        border: none;
        box-shadow: 0 6px 24px rgba(44,62,80,0.30), 0 2px 6px rgba(44,62,80,0.15);
        cursor: pointer;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .btn-login::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 60%);
        border-radius: 14px;
        pointer-events: none;
      }

      .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(44,62,80,0.35), 0 4px 10px rgba(44,62,80,0.18);
        color: #fff;
        text-decoration: none;
      }

      .btn-login:active {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(44,62,80,0.2);
      }

      .btn-login .google-icon-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: white;
        border-radius: 8px;
        padding: 4px;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      }

      .btn-login .google-icon-wrap img {
        width: 22px;
        height: 22px;
        display: block;
      }

      .btn-divider {
        width: 1px;
        height: 26px;
        background: rgba(255,255,255,0.22);
        margin: 0 2px;
      }

      /* ─── FOOTER ──────────────────────────────────────────────── */
      footer {
        margin-top: 60px;
      }

      .footer {
        background: var(--primary);
        color: rgba(255,255,255,0.85);
        padding: 0;
      }

      .footer-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 32px 48px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.10);
        gap: 20px;
        flex-wrap: wrap;
      }

      .footer-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .footer-brand-icon {
        width: 44px;
        height: 44px;
        background: rgba(255,255,255,0.12);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }

      .footer-brand-text h4 {
        font-family: "Playfair Display", serif;
        font-size: 17px;
        font-weight: 700;
        color: #fff;
        margin: 0 0 2px;
      }

      .footer-brand-text span {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.5);
        font-weight: 600;
      }

      .footer-links {
        display: flex;
        gap: 24px;
      }

      .footer-links a {
        color: rgba(255,255,255,0.6);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        letter-spacing: 0.5px;
        transition: color 0.2s;
      }

      .footer-links a:hover {
        color: #fff;
      }

      .footer-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 48px;
        flex-wrap: wrap;
        gap: 8px;
      }

      .footer-bottom p {
        margin: 0;
        font-size: 12.5px;
        color: rgba(255,255,255,0.45);
        font-weight: 500;
      }

      .footer-bottom .location {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: rgba(255,255,255,0.45);
        font-weight: 500;
      }

      .footer-bottom .location svg {
        opacity: 0.6;
        flex-shrink: 0;
      }

      /* ─── RESPONSIVE ──────────────────────────────────────────── */
      @media (max-width: 1024px) {
        .header { padding: 0 20px; height: 80px; }
        .header-logo img { height: 54px; }
        .header-title h3 { font-size: 22px; }
        .slideshow-container { max-width: 92%; }
        .mySlides img { height: 400px; }
      }

      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          height: auto;
          padding: 14px 16px 10px;
          gap: 8px;
          position: sticky;
        }
        .header-title {
          position: static;
          transform: none;
        }
        .header-title h3 { font-size: 18px; }
        .header-title span { font-size: 10px; }
        .mySlides img { height: 320px; }
        .footer-top { padding: 24px 24px 18px; flex-direction: column; align-items: flex-start; }
        .footer-bottom { padding: 14px 24px; }
      }

      @media (max-width: 480px) {
        .header-logo img { height: 44px; }
        .header-title h3 { font-size: 16px; }
        .mySlides img { height: 200px; }
        .btn-login { height: 52px; font-size: 14px; padding: 0 24px; }
        .footer-top { gap: 16px; }
        .footer-links { flex-wrap: wrap; gap: 14px; }
        .footer-bottom { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>

  <body>

    <!-- ─── HEADER ─────────────────────────────────────────────── -->
    <div class="header">
      <a class="header-logo" href="/">
        <img src="./static/Sitare-University-Logo.webp" alt="Sitare University Logo" />
      </a>

      <div class="header-title">
        <h3>Feedback Management Portal</h3>
        <span>Sitare University</span>
      </div>

      <ul class="header-nav">
        <li><a href="/about_us">About Us</a></li>
      </ul>
    </div>

    <!-- ─── SLIDESHOW ───────────────────────────────────────────── -->
    <div class="slideshow-container">
      <div class="mySlides">
        <img src="./static/slides1.jpg" alt="University Group Photo" />
      </div>
      <div class="mySlides">
        <img src="./static/slides2.jpg" alt="Batch 2023-2027" />
      </div>
      <div class="mySlides">
        <img src="./static/slides3.jpg" alt="Batch 2023-2027" />
      </div>
      <div class="mySlides">
        <img src="./static/slides4.jpg" alt="Semester End Photo" />
      </div>
      <div class="mySlides">
        <img src="./static/slides5.jpg" alt="Semester End Photo" />
      </div>
      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <div class="dots-wrapper">
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
      <span class="dot" onclick="currentSlide(4)"></span>
      <span class="dot" onclick="currentSlide(5)"></span>
    </div>

    <!-- ─── CTA ────────────────────────────────────────────────── -->
    <div class="cta-section">
      <p class="cta-label">Student &amp; Faculty Access</p>
      <a href="/login" style="text-decoration:none;">
        <button class="btn-login">
          <span class="google-icon-wrap">
            <img src="./static/google-icon.png" alt="Google" />
          </span>
          <span class="btn-divider"></span>
          Continue with Google
        </button>
      </a>
    </div>

    <!-- ─── FOOTER ──────────────────────────────────────────────── -->
    <footer>
      <div class="footer">
        <div class="footer-top">
          <div class="footer-brand">
            <div class="footer-brand-icon">🎓</div>
            <div class="footer-brand-text">
              <h4>Sitare University</h4>
              <span>Feedback Management Portal</span>
            </div>
          </div>
          <div class="footer-links">
            <a href="/about_us">About Us</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Contact</a>
          </div>
        </div>
        <div class="footer-bottom">
          <p>© 2025 Sitare University. All rights reserved.</p>
          <div class="location">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            Temporary Campus: SRMCEM, Lucknow, India
          </div>
        </div>
      </div>
    </footer>

    <script>
      let slideIndex = 0;
      let slideInterval;

      showSlides();

      function showSlides() {
        const slides = document.getElementsByClassName("mySlides");
        const dots = document.getElementsByClassName("dot");
        for (let i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
          dots[i].classList.remove("active");
        }
        slideIndex++;
        if (slideIndex > slides.length) slideIndex = 1;
        slides[slideIndex - 1].style.display = "block";
        dots[slideIndex - 1].classList.add("active");
        clearInterval(slideInterval);
        slideInterval = setInterval(showSlides, 3000);
      }

      function plusSlides(n) {
        clearInterval(slideInterval);
        slideIndex += n - 1;
        const total = document.getElementsByClassName("mySlides").length;
        if (slideIndex > total) slideIndex = 1;
        else if (slideIndex < 1) slideIndex = total;
        showSlides();
      }

      function currentSlide(n) {
        clearInterval(slideInterval);
        slideIndex = n - 1;
        showSlides();
      }

      const container = document.querySelector(".slideshow-container");
      container.addEventListener("mouseover", () => clearInterval(slideInterval));
      container.addEventListener("mouseout", () => { slideInterval = setInterval(showSlides, 3000); });
    </script>
  </body>
</html>
