<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unauthorized Access</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .message {
            text-align: center;
            background-color: white;
            padding: 40px 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        
        .message h1 {
            margin-bottom: 20px;
            color: #721c24;
        }
        
        .message p {
            margin-bottom: 20px;
        }
        
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem 1rem;
            width: 100%;
        }
        
        footer p {
            margin: 0.25rem 0;
            color: white;
        }
        
        @media (max-width: 768px) {
            .message {
                padding: 30px 15px;
            }
            
            .message h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="message">
            <h1>Unauthorized Access</h1>
            <p>Sorry! Please log in with a Sitare Email ID.</p>
            <a href="{{ url_for('login') }}" class="btn btn-primary">Return to Login</a>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2025 Sitare University. All rights reserved.</p>
            <p>Temporary Campus: SRMCEM Lucknow, India</p>
        </div>
    </footer>
</body>
</html>
